name: CI

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "src/**"
      - "tests/**"
      - "monitoring/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "api/**"
      - "src/**"
      - "tests/**"
      - "monitoring/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest
