name: Drift Monitoring

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run drift check
        run: python -m monitoring.drift_check

      - name: Upload drift status
        uses: actions/upload-artifact@v4
        with:
          name: drift-status
          path: reports/drift_status.json
          if-no-files-found: warn

      - name: Trigger retraining if drift detected
        id: trigger-retrain
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import os
          path = Path("reports/drift_status.json")
          if not path.exists():
              print("No drift status file found.")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("drift_detected=false\n")
                  fh.write("drifted_features=\n")
              raise SystemExit(0)
          status = json.loads(path.read_text(encoding="utf-8"))
          drift_detected = bool(status.get("drift_detected", False))
          drifted_features = ",".join(status.get("drifted_features", []))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"drift_detected={'true' if drift_detected else 'false'}\n")
              fh.write(f"drifted_features={drifted_features}\n")
              fh.write(f"reason={status.get('reason', '')}\n")
          if status.get("drift_detected"):
              print("drift_detected=true")
              raise SystemExit(0)
          print("drift_detected=false")
          PY

      - name: Dispatch train workflow
        if: steps.trigger-retrain.outputs.drift_detected == 'true'
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/train.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Notify Slack on drift
        if: steps.trigger-retrain.outputs.drift_detected == 'true' && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ Drift detected in features: ${{ steps.trigger-retrain.outputs.drifted_features }}. Automated retraining workflow dispatched.\"}" \
            "$SLACK_WEBHOOK_URL"
